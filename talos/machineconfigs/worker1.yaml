# Talos machine configuration for worker node 1
version: v1.7.0
persist: true
machine:
  type: worker
  network:
    hostname: worker1
    interfaces:
      - device: eth0
        cidr: 192.168.1.104/24
  install:
    disk: /dev/sda
    image: ghcr.io/siderolabs/talos:v1.7.0
  kubelet:
    extraArgs:
      node-ip: 192.168.1.104
cluster:
  network:
    pod:
      cidrs:
        - 10.244.0.0/16
    service:
      cidrs:
        - 10.96.0.0/12
