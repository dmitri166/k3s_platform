# Velero namespace configuration
apiVersion: v1
kind: Namespace
metadata:
  name: velero
  labels:
    name: velero
    app.kubernetes.io/part-of: k3s-platform
    environment: development
    purpose: backup-services
  annotations:
    argocd.argoproj.io/sync-options: CreateNamespace=true
---
# Resource quota for velero namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: velero-quota
  namespace: velero
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    persistentvolumeclaims: "5"
    pods: "10"
    services: "5"
    secrets: "10"
    configmaps: "5"
---
# Limit range for velero namespace
apiVersion: v1
kind: LimitRange
metadata:
  name: velero-limits
  namespace: velero
spec:
  limits:
  - default:
      cpu: 100m
      memory: 128Mi
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    max:
      cpu: 500m
      memory: 512Mi
    min:
      cpu: 50m
      memory: 64Mi
    type: Container

