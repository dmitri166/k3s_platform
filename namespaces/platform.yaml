# Platform namespace configuration
apiVersion: v1
kind: Namespace
metadata:
  name: platform
  labels:
    name: platform
    app.kubernetes.io/part-of: k3s-platform
    environment: development
    purpose: platform-services
  annotations:
    argocd.argoproj.io/sync-options: CreateNamespace=true
---
# Resource quota for platform namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: platform-quota
  namespace: platform
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    persistentvolumeclaims: "5"
    pods: "20"
    services: "10"
    secrets: "10"
    configmaps: "10"
---
# Limit range for platform namespace
apiVersion: v1
kind: LimitRange
metadata:
  name: platform-limits
  namespace: platform
spec:
  limits:
  - default:
      cpu: 200m
      memory: 256Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    max:
      cpu: 500m
      memory: 512Mi
    min:
      cpu: 50m
      memory: 64Mi
    type: Container

