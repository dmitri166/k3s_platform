# Monitoring namespace configuration
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    name: monitoring
    app.kubernetes.io/part-of: k3s-platform
    environment: development
    purpose: monitoring-services
  annotations:
    argocd.argoproj.io/sync-options: CreateNamespace=true
---
# Resource quota for monitoring namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 3Gi
    limits.cpu: "6"
    limits.memory: 6Gi
    persistentvolumeclaims: "10"
    pods: "30"
    services: "15"
    secrets: "15"
    configmaps: "15"
---
# Limit range for monitoring namespace
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: monitoring
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 200m
      memory: 256Mi
    type: Container
  - max:
      cpu: 1000m
      memory: 2Gi
    min:
      cpu: 100m
      memory: 128Mi
    type: Container

