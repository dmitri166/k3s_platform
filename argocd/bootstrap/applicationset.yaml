# ArgoCD ApplicationSets for bootstrapping platform components.
#
# Why two sets:
# - Git apps deploy plain Kubernetes manifests from this repo.
# - Helm apps deploy upstream charts while reusing values files from this repo.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: k3s-platform-git-apps
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - name: namespaces
        path: namespaces
        namespace: argocd
      - name: minio
        path: apps/minio
        namespace: minio
      - name: ai-analysis
        path: apps/ai-analysis/k8s
        namespace: ai-analysis
      - name: ai-observability
        path: apps/ai-observability/k8s
        namespace: ai-observability
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      labels:
        app.kubernetes.io/name: '{{name}}'
        app.kubernetes.io/part-of: k3s-platform
    spec:
      project: default
      source:
        repoURL: https://github.com/dmitri166/k3s_platform.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: k3s-platform-helm-apps
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - name: ingress-nginx
        namespace: ingress-nginx
        chart: ingress-nginx
        repoURL: https://kubernetes.github.io/ingress-nginx
        targetRevision: 4.11.3
        valuesPath: apps/ingress-nginx/values.yaml
      - name: cert-manager
        namespace: cert-manager
        chart: cert-manager
        repoURL: https://charts.jetstack.io
        targetRevision: v1.16.1
        valuesPath: apps/cert-manager/values.yaml
      - name: loki-stack
        namespace: monitoring
        chart: loki-stack
        repoURL: https://grafana.github.io/helm-charts
        targetRevision: 2.10.2
        valuesPath: apps/loki-stack/values.yaml
      - name: opa-gatekeeper
        namespace: gatekeeper-system
        chart: gatekeeper
        repoURL: https://open-policy-agent.github.io/gatekeeper/charts
        targetRevision: 3.17.1
        valuesPath: apps/opa-gatekeeper/values.yaml
      - name: falco
        namespace: falco
        chart: falco
        repoURL: https://falcosecurity.github.io/charts
        targetRevision: 4.21.0
        valuesPath: apps/falco/values.yaml
      - name: velero
        namespace: velero
        chart: velero
        repoURL: https://vmware-tanzu.github.io/helm-charts
        targetRevision: 8.3.0
        valuesPath: apps/velero/values.yaml
      - name: tempo
        namespace: monitoring
        chart: tempo
        repoURL: https://grafana.github.io/helm-charts
        targetRevision: 1.10.3
        valuesPath: apps/tempo/values.yaml
      - name: opentelemetry-collector
        namespace: monitoring
        chart: opentelemetry-collector
        repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
        targetRevision: 0.111.1
        valuesPath: apps/opentelemetry-collector/values.yaml
      - name: vault
        namespace: vault
        chart: vault
        repoURL: https://helm.releases.hashicorp.com
        targetRevision: 0.30.0
        valuesPath: apps/vault/values.yaml
      - name: external-secrets
        namespace: external-secrets
        chart: external-secrets
        repoURL: https://charts.external-secrets.io
        targetRevision: 0.10.5
        valuesPath: apps/external-secrets/values.yaml
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      labels:
        app.kubernetes.io/name: '{{name}}'
        app.kubernetes.io/part-of: k3s-platform
    spec:
      project: default
      sources:
      - repoURL: '{{repoURL}}'
        chart: '{{chart}}'
        targetRevision: '{{targetRevision}}'
        helm:
          valueFiles:
          - '$values/{{valuesPath}}'
      - repoURL: https://github.com/dmitri166/k3s_platform.git
        targetRevision: HEAD
        ref: values
      ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
        name: vault-agent-injector-cfg
        jqPathExpressions:
        - .webhooks
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - name: kube-prometheus-stack
        namespace: monitoring
        chart: kube-prometheus-stack
        repoURL: https://prometheus-community.github.io/helm-charts
        targetRevision: 65.8.1
        valuesPath: apps/kube-prometheus-stack/values.yaml
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      labels:
        app.kubernetes.io/name: '{{name}}'
        app.kubernetes.io/part-of: k3s-platform
    spec:
      project: default
      sources:
      - repoURL: '{{repoURL}}'
        chart: '{{chart}}'
        targetRevision: '{{targetRevision}}'
        helm:
          skipCrds: true
          valueFiles:
          - '$values/{{valuesPath}}'
      - repoURL: https://github.com/dmitri166/k3s_platform.git
        targetRevision: HEAD
        ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prometheus-crds
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - name: prometheus-crds
        path: example/prometheus-operator-crd
        repoURL: https://github.com/prometheus-operator/prometheus-operator
        targetRevision: v0.77.2
        namespace: default
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      labels:
        app.kubernetes.io/name: '{{name}}'
        app.kubernetes.io/part-of: k3s-platform
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
    spec:
      project: default
      source:
        repoURL: '{{repoURL}}'
        targetRevision: '{{targetRevision}}'
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - ServerSideApply=true
        - Replace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
