# ArgoCD ApplicationSet for bootstrapping all platform applications
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: k3s-platform-apps
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - name: namespaces
        path: namespaces
        namespace: argocd
      - name: ingress-nginx
        path: apps/ingress-nginx
        namespace: ingress-nginx
      - name: cert-manager
        path: apps/cert-manager
        namespace: cert-manager
      - name: kube-prometheus-stack
        path: apps/kube-prometheus-stack
        namespace: monitoring
      - name: loki-stack
        path: apps/loki-stack
        namespace: monitoring
      - name: opa-gatekeeper
        path: apps/opa-gatekeeper
        namespace: gatekeeper-system
      - name: falco
        path: apps/falco
        namespace: falco
      - name: minio
        path: apps/minio
        namespace: minio
      - name: velero
        path: apps/velero
        namespace: velero
      - name: vault
        path: apps/vault
        namespace: vault
      - name: external-secrets
        path: apps/external-secrets
        namespace: external-secrets
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      labels:
        app.kubernetes.io/name: '{{name}}'
        app.kubernetes.io/part-of: k3s-platform
    spec:
      project: default
      source:
        repoURL: https://github.com/dmitri166/k3s_platform.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

