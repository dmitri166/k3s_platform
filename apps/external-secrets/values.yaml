# External Secrets Operator configuration
replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Enable External Secrets Operator
externalSecrets:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Enable cert controller
certController:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Enable webhook
webhook:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Enable metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: true

# Enable network policies
networkPolicy:
  enabled: true

# Enable RBAC
rbac:
  create: true

# Enable service account
serviceAccount:
  create: true

# Enable pod security
podSecurityPolicy:
  enabled: false

# Enable leader election
leaderElection:
  enabled: true

# Enable webhook
webhook:
  port: 9443
  hostPort: 0

# Enable cert controller
certController:
  port: 9443
  hostPort: 0

# Enable external secrets
externalSecrets:
  port: 8080
  hostPort: 0
