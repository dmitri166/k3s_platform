apiVersion: batch/v1
kind: CronJob
metadata:
  name: ai-analysis
  namespace: ai-analysis
  labels:
    app.kubernetes.io/name: ai-analysis
    app.kubernetes.io/part-of: k3s-platform
  annotations:
    # Sync-wave 1: deploy after the monitoring stack (wave 0 by default)
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Daily at 06:00 UTC – adjust to your preferred time
  schedule: "0 6 * * *"

  # Keep the last 3 successful and 3 failed job records for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  # Do not start a new job if the previous one is still running
  concurrencyPolicy: Forbid

  jobTemplate:
    spec:
      # Retry up to 2 times on failure before marking the job as failed
      backoffLimit: 2

      template:
        metadata:
          labels:
            app.kubernetes.io/name: ai-analysis
        spec:
          serviceAccountName: ai-analysis

          # Do not auto-mount the default SA token (we use explicit RBAC)
          automountServiceAccountToken: true

          containers:
            - name: ai-analysis
              # ─────────────────────────────────────────────────────────────
              # IMAGE: replace with your registry path after `docker build`.
              # Options:
              #   a) DockerHub:  <dockerhub-user>/ai-analysis:latest
              #   b) Local k3s:  After `docker build` run:
              #                  docker save ai-analysis:local | k3s ctr images import -
              #                  then set:  image: ai-analysis:local
              #                             imagePullPolicy: Never
              # ─────────────────────────────────────────────────────────────
              image: ai-analysis:latest
              imagePullPolicy: Always

              # Inject non-sensitive config from ConfigMap
              envFrom:
                - configMapRef:
                    name: ai-analysis-config

              # Inject the Groq API key from the Secret
              env:
                - name: GROQ_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: groq-api-key
                      key: GROQ_API_KEY

              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "2Gi"
                  cpu: "1000m"

              volumeMounts:
                - name: reports
                  mountPath: /reports

              # Security hardening
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false   # needs write access to /reports
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop: [ALL]

          volumes:
            - name: reports
              persistentVolumeClaim:
                claimName: ai-analysis-reports

          restartPolicy: OnFailure
