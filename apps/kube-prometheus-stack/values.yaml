# Prometheus monitoring stack configuration (optimized for small workers)
prometheus:
  enabled: true
  service:
    type: NodePort
  prometheusSpec:
    # Lower scrape/evaluation pressure for homelab-sized control planes.
    scrapeInterval: 1m
    evaluationInterval: 1m
    retention: 3d
    walCompression: true
    resources:
      requests:
        cpu: 400m
        memory: 768Mi
      limits:
        cpu: 1000m
        memory: 1536Mi
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
         
  storageSpec:
    volumeClaimTemplate:
      spec:
        storageClassName: "local-path"
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 4Gi

alertmanager:
  enabled: true
  service:
    type: NodePort
  alertmanagerSpec:
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 300m
        memory: 512Mi
  extraVolumes:
  - name: smtp-secret
    secret:
      secretName: smtp-secret
  extraVolumeMounts:
  - name: smtp-secret
    mountPath: /etc/alertmanager/secrets
  
  additionalConfig:
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'dmitri.k2026.work@gmail.com'
      smtp_auth_username: 'dmitri.k2026.work@gmail.com'
      smtp_auth_password_file: '/etc/alertmanager/secrets/password'
    route:
      receiver: 'email-receiver'
    receivers:
    - name: 'email-receiver'
      email_configs:
      - to: 'dmitri.k2026.work@gmail.com'
        from: 'dmitri.k2026.work@gmail.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'dmitri.k2026.work@gmail.com'
        auth_password_file: '/etc/alertmanager/secrets/password'

grafana:
  enabled: true
  service:
    type: NodePort
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  sidecar:
    datasources:
      enabled: true
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://prometheus-stack-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
            isDefault: true
          - name: Loki
            type: loki
            access: proxy
            url: http://loki-stack.monitoring.svc.cluster.local:3100
            isDefault: false
    dashboards:
      enabled: true

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

defaultRules:
  create: true

kubeProxy:
  enabled: true

kubeEtcd:
  enabled: true

kubeScheduler:
  enabled: true

kubeControllerManager:
  enabled: true

# Disable Backstage for resource optimization
backstage:
  enabled: false

# Disable Kubecost for resource optimization
kubecost:
  enabled: false

prometheusOperator:
  createCustomResource: false
  admissionWebhooks:
    patch:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    createSecretJob:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
