apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-observability
  template:
    metadata:
      labels:
        app: ai-observability
    spec:
      # Add tolerations to allow scheduling on workers
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: ai-observability
        image: dmitri166/k3s-ai-observability:latest
        ports:
        - containerPort: 8000
        env:
        - name: CONFIG_PATH
          value: /app/config.py
        volumeMounts:
        - name: config
          mountPath: /app/config.py
          subPath: config.py
        - name: models
          mountPath: /app/models
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: ai-observability-config
      - name: models
        persistentVolumeClaim:
          claimName: ai-observability-models