apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-observability
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: ai-observability
    app.kubernetes.io/part-of: k3s-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-observability
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-observability
    spec:
      serviceAccountName: ai-observability

      # Do not auto-mount the default SA token (we use explicit RBAC)
      automountServiceAccountToken: true

      containers:
       -  name: ai-observability
          image: dmitri166/k3s-ai-observability:latest
          imagePullPolicy: Always

          # Inject non-sensitive config from ConfigMap
          env:
            - name: PROMETHEUS_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-observability-config
                  key: PROMETHEUS_URL
            - name: LOKI_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-observability-config
                  key: LOKI_URL
            - name: TEMPO_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-observability-config
                  key: TEMPO_URL
            - name: GRAFANA_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-observability-config
                  key: GRAFANA_URL
            - name: GROQ_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ai-observability-config
                  key: GROQ_MODEL
            - name: GROQ_MAX_RPM
              valueFrom:
                configMapKeyRef:
                  name: ai-observability-config
                  key: GROQ_MAX_RPM
            - name: LOOKBACK_HOURS
              valueFrom:
                configMapKeyRef:
                  name: ai-observability-config
                  key: LOOKBACK_HOURS
            - name: REPORT_DIR
              valueFrom:
                configMapKeyRef:
                  name: ai-observability-config
                  key: REPORT_DIR
            - name: SLACK_CHANNEL
              valueFrom:
                configMapKeyRef:
                  name: ai-observability-config
                  key: SLACK_CHANNEL
            - name: BOT_USER_ID
              valueFrom:
                configMapKeyRef:
                  name: ai-observability-config
                  key: BOT_USER_ID
            - name: HTTP_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: ai-observability-config
                  key: HTTP_TIMEOUT_SECONDS
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-observability-secrets
                  key: GROQ_API_KEY
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-observability-secrets
                  key: SLACK_APP_TOKEN
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-observability-secrets
                  key: SLACK_BOT_TOKEN
            - name: GRAFANA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-observability-secrets
                  key: GRAFANA_API_KEY

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Security hardening
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # may need write access for temp files/logs
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]