---
# ServiceAccount used by the Deployment pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-observability
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: ai-observability
    app.kubernetes.io/part-of: k3s-platform

---
# ClusterRole: read-only view of cluster resources needed for context enrichment
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-observability-reader
  labels:
    app.kubernetes.io/name: ai-observability
    app.kubernetes.io/part-of: k3s-platform
rules:
  # Pod, Node, Event data
  - apiGroups: [""]
    resources: [pods, nodes, events, namespaces, persistentvolumeclaims]
    verbs: [get, list, watch]
  # Deployment / ReplicaSet health
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets, daemonsets]
    verbs: [get, list]
  # CronJob itself (for self-inspection)
  - apiGroups: [batch]
    resources: [cronjobs, jobs]
    verbs: [get, list]

---
# Bind the ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-observability-reader
  labels:
    app.kubernetes.io/name: ai-observability
    app.kubernetes.io/part-of: k3s-platform
subjects:
  - kind: ServiceAccount
    name: ai-observability
    namespace: ai-observability
roleRef:
  kind: ClusterRole
  name: ai-observability-reader
  apiGroup: rbac.authorization.k8s.io
