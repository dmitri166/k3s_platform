apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-observability-reports
  namespace: ai-observability
  labels:
    app.kubernetes.io/name: ai-observability
    app.kubernetes.io/part-of: k3s-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Uses the default K3s local-path storage class.
  # Change to a network-backed StorageClass if you need ReadWriteMany.
  storageClassName: local-path
