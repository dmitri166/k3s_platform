# NGINX Ingress Controller configuration
controller:
  service:
    type: NodePort
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    use-forwarded-headers: "true"
  replicaCount: 1

defaultBackend:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

rbac:
  create: true

serviceAccount:
  create: true
