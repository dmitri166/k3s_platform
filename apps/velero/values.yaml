# Velero backup and restore configuration
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
      memory: 512Mi

# Enable Velero
velero:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Enable restic
restic:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Enable node agent
nodeAgent:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Configure local storage for on-premises
defaultVolumesToFsBackup: true
defaultBackupLocation: "default"
defaultVolumesSnapshotLocation: "default"

# Storage configuration
defaultBackupStorageLocation: "default"
defaultVolumeSnapshotLocation: "default"
defaultVolumesToFsBackup: true

# Storage class configuration
defaultStorageClass: "standard"
defaultStorageClassPriority: 0

# Enable schedules
schedules:
  enabled: true

# Enable backups
backups:
  enabled: true
  ttl: "720h0m0s"  # 30 days

# Enable restores
restores:
  enabled: true

# Enable metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: true

# Enable snapshots
snapshots:
  enabled: true

# Enable upgrade
upgrade:
  enabled: true

# Configuration
configuration:
  provider: local
  backupStorageLocation:
    name: default
    config:
      path: /var/velero-backups
  volumeSnapshotLocation:
    name: default
    config:
      path: /var/velero-snapshots

# Enable snapshots
snapshots:
  enabled: true

# Enable upgrade
upgrade:
  enabled: true
