# Velero configuration for local K3s lab with MinIO backend
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

credentials:
  useSecret: true
  existingSecret: velero-credentials

initContainers:
- name: velero-plugin-for-aws
  image: velero/velero-plugin-for-aws:v1.9.2
  imagePullPolicy: IfNotPresent
  volumeMounts:
  - mountPath: /target
    name: plugins

configuration:
  backupStorageLocation:
  - name: default
    provider: aws
    bucket: velero
    default: true
    config:
      region: minio
      s3ForcePathStyle: "true"
      s3Url: http://minio.minio.svc.cluster.local:9000
  volumeSnapshotLocation:
  - name: default
    provider: aws
    config:
      region: minio

deployNodeAgent: true
snapshotsEnabled: false
backupsEnabled: true

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
