# Vault OSS configuration for K3s lab
server:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  dataStorage:
    enabled: true
    size: 1Gi
    storageClass: local-path
  extraEnvironmentVars:
    VAULT_ADDR: "http://vault.vault.svc.cluster.local:8200"
    VAULT_API_ADDR: "http://vault.vault.svc.cluster.local:8200"

ui:
  enabled: true
  serviceType: NodePort

injector:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

csi:
  enabled: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

global:
  tlsDisable: true
