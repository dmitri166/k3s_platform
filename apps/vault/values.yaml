# Vault OSS secrets management configuration (optimized for small workers)
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Enable Vault
vault:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Enable UI
ui:
  enabled: true
  serviceType: LoadBalancer
  loadBalancerIP: 192.168.1.244
  annotations:
    metallb.universe.tf/address-pool: default

# Enable injector
injector:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Enable server
server:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Enable dev mode for testing
global:
  dev: false

# Enable authentication
auth:
  enabled: true

# Enable secrets engine
secrets:
  enabled: true

# Enable audit
audit:
  enabled: true

# Enable storage
storage:
  enabled: true
  type: file
  path: /vault/data

# Persistent volume for Vault data
persistence:
  enabled: true
  size: 1Gi
  storageClass: "standard"
  accessMode: ReadWriteOnce

# Enable metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: true

# Enable network policies
networkPolicy:
  enabled: true

# Enable pod security
podSecurityPolicy:
  enabled: false

# Enable service account
serviceAccount:
  create: true

# Enable RBAC
rbac:
  create: true

# On-premises specific configuration
server:
  extraEnv:
    - name: VAULT_ADDR
      value: "http://vault.vault.svc.cluster.local:8200"
    - name: VAULT_API_ADDR
      value: "http://vault.vault.svc.cluster.local:8200"
